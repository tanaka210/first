<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベント情報</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f3f4f6;
      font-family: sans-serif;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      border-radius: 10px;
      overflow: hidden;
    }

    /* ヘッダー */
    .header {
      background: #cfcfcf;
      text-align: center;
      padding: 20px;
      font-weight: bold;
    }

     /*<!-- 左 -->*/
     .sidebar-left{
        width: 260px;
        background: white;
        border-radius: 16px;
        padding: 24px;

        border: 2px solid #ccc;
    }

     /*<!-- 中央 -->*/
     .content{
    flex: 1;
    background: white;
    border-radius: 16px;
    padding: 24px;

    border: 2px solid #ccc;
    }
    
     /*<!-- 右 -->*/
    .sidebar-right{
    width: 260px;
    background: white;
    border-radius: 16px;
    padding: 24px;

    border: 2px solid #ccc;
}

.main{
    display: flex;
    gap: 20px;
    margin-top: 20px;
}



  </style>
</head>
<body>

  <div class="container">

    <!-- ヘッダー -->
    <header class="header">
      出演者情報
    </header>

    <main class="main">

      <!-- 左 -->
      <aside class="sidebar-left">
        出演者A
      </aside>

      <!-- 中央 -->
      <section class="content">
        ゲーム・作品紹介
      </section>

      <!-- 右 -->
      <aside class="sidebar-right">
        最新情報
      </aside>

    </main>
  </div>

</body>
</html>
